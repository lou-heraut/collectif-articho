<!DOCTYPE html>
<html lang="fr">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ARTI/CHÔ</title>
	<link rel="icon" href="resources/assets/favicon.ico" type="image/x-icon">

	<!-- Google Fonts -->
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Two+Tone|Material+Icons+Sharp">

	<!-- jQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	
	<style>

	 /* Faune Display Black */
	 @font-face {
	     font-family: 'Faune-Black';
	     src: url('resources/fonts/faune.display-black.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 /* Faune Display Bold Italic */
	 @font-face {
	     font-family: 'Faune-BoldItalic';
	     src: url('resources/fonts/faune.display-bold-italic.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 /* Faune Display Thin */
	 @font-face {
	     font-family: 'Faune-Thin';
	     src: url('resources/fonts/faune.display-thin.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 /* Faune Text Bold */
	 @font-face {
	     font-family: 'Faune-Bold';
	     src: url('resources/fonts/faune.text-bold.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 /* Faune Text Italic */
	 @font-face {
	     font-family: 'Faune-Italic';
	     src: url('resources/fonts/faune.text-italic.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 /* Faune Text Regular */
	 @font-face {
	     font-family: 'Faune-Regular';
	     src: url('resources/fonts/faune.text-regular.otf') format('opentype');
	     font-weight: normal;
	     font-style: normal;
	 }
	 
         body {
             /* margin: 0; */
	     margin-left: 4rem; 
	     margin-right: 4rem; 
             padding: 0;
	     background-color: #ffffff;
	     color: #213589;
	     font-family: 'Faune-Regular', sans-serif;
	     font-size: 1rem;
         }


	 a {
	     color: #213589;
	     text-decoration: none;
	 }




	 .bunch {
	     display: flex;
	     flex-direction: row;
	     flex-wrap: wrap;
	     align-items: baseline;
	     margin: -1px;
	 }
	 
	 button {
	     font: inherit;
	     border: none;
	     min-width: 2rem;
	     padding: 0 0.4rem;
	     margin: 0;
	     background-color: transparent;
	     cursor: pointer;
	     color: #89898a;
	     touch-action: manipulation;
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }
	 button.selected {
	     color: #060508;
	     font-weight: bold;
	 }
	 button:hover,
	 a:focus,
	 a:hover {
	     font-weight: normal;
	     color: #060508;
	 }

	 button.selected .notif,
	 button:hover .notif {
	     position: absolute;
	     top: 0.25rem;
	     right: -0.05rem;
	     transform: translateY(-50%);
	     height: 0.6rem;
	     width: 0.6rem;
	     border-radius: 1rem/1rem;
	     background: red;
	     border: solid 2px #ffffff;
	     color: white;
	     display: inline-block;
	 }




	 
	 



	 #header {
	     position: fixed;
	     margin-left: 4rem; 
	     margin-right: 4rem; 
	     top: 0px;
	     left: 0px;
	     height: 6rem;
	     width: calc(100vw - 8rem);
	     background: #ffffff;
	 }

	 #articho_logo {
	     position: absolute;
	     background: url("resources/assets/articho_logo.svg") center/cover no-repeat;
	     background-size: 100%;
	     width: 10rem;
	     height: 100%;
	     margin-left: 1rem;
	     margin-right: 1rem;
	     margin-bottom: 0.2rem;
	     bottom: 0px;
	     cursor: pointer;
	     border: none;
	     outline: none;
	 }

	 #header_tab {
	     position: absolute;
	     right: 0px;
	     height: 100%;
	     margin-bottom: 0.3rem;
	     margin-right: 1rem;
	     display: flex;
	     flex-direction: row;
	     flex-wrap: wrap;
	     align-items: center;
	 }
	 #header_tab button {
	     background-color: #ffffff;
	     color: #213589;
	     font-family: 'Faune-Bold', sans-serif;
	     font-size: 1.2rem;
	     border: none;
	     min-width: 2rem;
	     padding: 0 0.4rem;
	     margin: 0;
	     background-color: transparent;
	     cursor: pointer;
	     touch-action: manipulation;
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }
	 #header_tab button.selected {
	     background: url("resources/assets/button_selected.png") center/cover no-repeat;
	     background-size: 6rem;
	     background-position-y: bottom;
	     color: #152259;
	     font-weight: normal;
	 }
	 #header_tab button:hover,
	 a:focus,
	 a:hover {
	     color: #152259;
	     font-weight: normal;
	 }
	 .sep {
	     color: #213589;
	     font-family: 'Faune-Bold', sans-serif;
	     padding-left: 0.2rem;
	     padding-right: 0.2rem;
	 }

	 #header_bar {
	     background: url("resources/assets/header_bar.png");
	     background-size: 100%;
	     width: 100%;
	     height: 100%;
	     margin-top: 1.2rem;
	 }


	 #footer {
	     margin-left: 4rem; 
	     margin-right: 4rem;
	     margin-top: 1rem;
	     margin-bottom: 2rem;
	     font-family: Helvetica, Arial, sans-serif;
	     font-size: 0.75rem;
	     position: absolute;
	     bottom: 0px;
	     left: 0px;
	     height: 4rem;
	     width: calc(100vw - 8rem);
	     background: #fff;
	     color: #151206;
	 }

	 #footer_social {
	     position: absolute;
	     right: 0px;
	     display: flex;
	     flex-direction: row;
	     flex-wrap: wrap;
	     align-items: center;
	 }
	 #footer_social a {
	     background-color: #ffffff;
	     color: #818181;
	     border: none;
	     padding-left: 1rem;
	     margin: 0;
	     background-color: transparent;
	     cursor: pointer;
	     touch-action: manipulation;
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }
	 
	 #footer hr {
	     margin-top: 2rem;
	     margin-bottom: 2rem;
	     border: 0;
	     border-top-width: 0px;
	     border-top-style: none;
	     border-top-color: currentcolor;
	     border-top: 1px solid #ddd;
	 }
	 
	 #footer_info {
	     position: absolute;
	     left: 0px;
	     bottom: 0px;
	     display: flex;
	     flex-direction: row;
	     flex-wrap: wrap;
	     align-items: center;
	 }
	 #footer_info a {
	     background-color: #ffffff;
	     color: #818181;
	     border: none;
	     min-width: 2rem;
	     padding-right: 1rem;
	     margin: 0;
	     background-color: transparent;
	     cursor: pointer;
	     touch-action: manipulation;
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }
	 #footer_info a:focus,
	 #footer_info a:hover {
	     color: #151206;
	     font-weight: normal;
	 }

	 
	 

	 #footer_copyright {
	     position: absolute;
	     right: 0px;
	     bottom: 0px;
	 }


	 
	 #container_gallery {
	     height: calc(100vh - 2rem);
	     flex: 1;
	     overflow-y: auto;
	     margin-top: 1rem;
         }
	 
	 .gallery {
	     transition: all 0.3s ease;
	     display: grid;
	     grid-template-rows: repeat(auto-fill, minmax(15vw, 1fr));
	     grid-template-columns: repeat(auto-fill, minmax(15vw, 1fr));
	     grid-gap: 1rem;
	     grid-auto-flow: dense;
	     height: 2500px;
	     overflow-y: auto;
	     padding-left: 1rem;
	     padding-right: 1rem;
	 }
	 .horizontal {
	     grid-column: span 2;
	 }
	 .vertical {
	     grid-row: span 2;
	 }


	 .gallery-item {
	     border: 3px solid #ffffff;
	     background-color: #ffffff;
	     padding: 1ch 1rem;
	     position: relative;
	     overflow: hidden;
	     border-radius: 10px;
	 }

	 .gallery-item img {
	     position: absolute;
	     top: 50%;
	     left: 50%;
	     transform: translate(-50%, -50%);
	 }

	 .gallery-item span {
	     position: relative;
	     z-index: 1;
	     color: #060508;
	 }


	 
	 @media (max-width: 768px) {
	     /* #back { */
	     /* flex-direction: column; */
	     /* align-items: stretch; */
	     /* }  */

	     .gallery {
		 width: 100vw;
		 margin-left: 20px;
		 top: 100vw;
	     }
	 }


	</style>
    </head>
    <body>

	
	<div id="header">
	    <div id="articho_logo"></div>
	    <div id="header_tab">
		<button id="header_tab_projet" class="selected" onclick="selectButton(this)">
		    <span>Les projets</span>
		</button>
		<div class="sep">•</div>
		<button id="header_tab_collectif" onclick="selectButton(this)">
		    <span>Le collectif</span>
		</button>
		<div class="sep">•</div>
		<button id="header_tab_amies" onclick="selectButton(this)">
		    <span>Les amies</span>
		</button>
		<div class="sep">•</div>
		<button id="header_tab_contact" onclick="selectButton(this)">
		    <span>Nous contacter</span>
		</button>
	    </div>
	    <div id="header_bar"></div>
	</div> 

	<div id="footer">
	    <div id="footer_social">
		<a id="footer_social_instagram" href="https://www.instagram.com/collectif.articho/" target="_blank">
		    <img src="/resources/assets/icon-instagram.svg"
			 onmouseover="changeImage(this, '_hover');"
			 onmouseout="restoreImage(this, '_hover');">
		</a>
		<a id="footer_social_facebook" href="https://www.facebook.com/collectifarticho/" target="_blank">
		    <img src="/resources/assets/icon-facebook.svg"
			 onmouseover="changeImage(this, '_hover');"
			 onmouseout="restoreImage(this, '_hover');">
		</a>
		<a id="footer_social_linkedin" href="https://fr.linkedin.com/company/collectif-arti-ch%C3%B4" target="_blank">
		    <img src="/resources/assets/icon-linkedin.svg"
			 onmouseover="changeImage(this, '_hover');"
			 onmouseout="restoreImage(this, '_hover');">
		</a>
	    </div>

	    <hr>
	    
	    <div id="footer_info">
		<a id="footer_info_a_propos">
		    <span>À propos</span>
		</a>
		<a id="footer_info_mentions_legales">
		    <span>Mentions légales</span>
		    <!-- Raison sociale de l'entreprise ou du propriétaire du site.
			 Forme juridique de l'entreprise.
			 Adresse du siège social.
			 Numéro de téléphone.
			 Adresse e-mail.
			 Numéro d'identification (SIRET, RCS, etc.). -->
		</a>
		<a id="footer_info_web_site">
		    <span>Site web</span>
		    <!-- Nom de l'hébergeur du site.
			 Adresse de l'hébergeur.
			 Coordonnées de l'hébergeur (téléphone, e-mail). -->
		</a>
		<a id="footer_info_contact">
		    <span>Contact</span>
		</a>
	    </div>

	    
	    
	    <div id="footer_copyright">
		<span>© 2024 ARTI/CHÔ tous droits réservés</span>
	    </div>
	</div>

	
	<script>

	 
	 function selectButton(selectedButton) {
	     var buttons = selectedButton.parentNode.querySelectorAll('button');
	     buttons.forEach(function (button) {
		 button.classList.remove('selected');
	     });
	     selectedButton.classList.add('selected');
	 }

	 function changeImage(img, suffix) {	     
             var originalSrc = img.src;
             var dotIndex = originalSrc.lastIndexOf('.');
             var path = originalSrc.substring(0, dotIndex);
             var extension = originalSrc.substring(dotIndex);
             img.src = path + suffix + extension;
	 }

	 function restoreImage(img, suffix) {
	     img.src = img.src.replace(suffix, ''); 
	 }

	 
	</script>
    </body>
</html>
