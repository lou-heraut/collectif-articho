<html lang="fr">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ARTI/CHÔ</title>
	<link rel="icon" href="resources/logo/favicon.ico" type="image/x-icon">

	<!-- Google Fonts -->

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway+Dots&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

	<!-- rel="stylesheet"> -->
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round|Material+Icons+Two+Tone|Material+Icons+Sharp">

	<!-- jQuery -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	
	<style>

	 /* font-family: 'Lato', sans-serif;
	    font-family: 'Poppins', sans-serif;
	    font-family: 'Raleway', sans-serif;
	    font-family: 'Raleway Dots', sans-serif; */
	 
         body {
             margin: 0;
             padding: 0;
             display: flex;
             height: 100vh;
             overflow: hidden;
	     background-color: #F5F5F5;
	     color: #060508;
	     font-family: "Lato", sans-serif;
	     font-size: 0.9rem;
         }


	 a {
	     color: #060508;
	     text-decoration: none;
	 }


	 .bunch {
	     display: flex;
	     flex-direction: row;
	     flex-wrap: wrap;
	     align-items: baseline;
	     margin: -1px;
	 }
	 
	 button {
	     font: inherit;
	     border: none;
	     min-width: 2rem;
	     padding: 0 0.4rem;
	     margin: 0;
	     background-color: transparent;
	     cursor: pointer;
	     color: #89898a;
	     touch-action: manipulation;
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }
	 button.selected {
	     color: #060508;
	     font-weight: bold;
	 }
	 button:hover,
	 a:focus,
	 a:hover {
	     font-weight: normal;
	     color: #060508;
	 }

	 button.selected .notif,
	 button:hover .notif {
	     position: absolute;
	     top: 0.25rem;
	     right: -0.05rem;
	     transform: translateY(-50%);
	     height: 0.6rem;
	     width: 0.6rem;
	     border-radius: 1rem/1rem;
	     background: red;
	     border: solid 2px #ffffff;
	     color: white;
	     display: inline-block;
	 }

	 .material-icons,
	 .material-icons-outlined,
	 .material-icons-round {
	     color: #302f2f;
	 }

	 .material-icons.inline-front,
	 .material-icons-outlined.inline-front,
	 .material-icons-round.inline-front {
	     font-size: 0.9rem;
	     margin-right: 0.2rem;
	 }

	 .material-icons.inline-back,
	 .material-icons-outlined.inline-back,
	 .material-icons-round.inline-back {
	     font-size: 0.9rem;
	     margin-left: 0.2rem;
	 }
	 

	 
	 button .material-icons,
	 button .material-icons-outlined {
	     color: #89898a;
	 }
	 button.selected .material-icons,
	 button.selected .material-icons-outlined {
	     color: #060508;
	     font-weight: bold;
	 }
	 button:hover .material-icons,
	 button:hover .material-icons-outlined {
	     color: #060508;
	     font-weight: normal;
	 }
	 
	
	 
	 .menu_section,
	 .menu_section-slider {
	     font-family: "Raleway", sans-serif;
	     font-weight: 400;
	     font-size: 1.3rem;
	     margin-top: 1.5rem;
	     margin-bottom: 0.3rem;
	     
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	 }







	 
	 


	 .sep {
	     position: relative;
	     display: inline-flex;
	     flex-wrap: nowrap;
	     align-items: center;
	     /* position: absolute; */
	     height: 50px;	     
	     border-left: 2px solid #F5F5F5;
	 }
	 .sep.big {
	     border-left: 3px solid #F5F5F5;
	 }
	 
	 .menuTitle {
	     font-family: "Raleway", sans-serif;
	     font-weight: 900;
	     font-size: 1.3rem;
	     color: #16171f;
	     display: flex;
	     flex-wrap: nowrap;
	     align-items: center;
	     justify-content: center;
	 }




	 #container_gallery {
	     height: calc(100vh - 2rem);
	     flex: 1;
	     overflow-y: auto;
	     margin-top: 1rem;
         }
	 
	 .gallery {
	     transition: all 0.3s ease;
	     display: grid;
	     grid-template-rows: repeat(auto-fill, minmax(15vw, 1fr));
	     grid-template-columns: repeat(auto-fill, minmax(15vw, 1fr));
	     grid-gap: 1rem;
	     grid-auto-flow: dense;
	     height: 2500px;
	     overflow-y: auto;
	     padding-left: 1rem;
	     padding-right: 1rem;
	 }
	 .horizontal {
	     grid-column: span 2;
	 }
	 .vertical {
	     grid-row: span 2;
	 }


	 .gallery-item {
	     border: 3px solid #ffffff;
	     background-color: #ffffff;
	     padding: 1ch 1rem;
	     position: relative;
	     overflow: hidden;
	     border-radius: 10px;
	 }

	 .gallery-item img {
	     position: absolute;
	     top: 50%;
	     left: 50%;
	     transform: translate(-50%, -50%);
	 }

	 .gallery-item span {
	     position: relative;
	     z-index: 1;
	     color: #060508;
	 }


	 
	 @media (max-width: 768px) {
	     /* #back { */
	     /* flex-direction: column; */
	     /* align-items: stretch; */
	     /* }  */

	     .gallery {
		 width: 100vw;
		 margin-left: 20px;
		 top: 100vw;
	     }
	 }


	</style>
    </head>
